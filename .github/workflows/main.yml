name: DevSecOps Chatroom CI/CD

on:
  push:
    branches: ["main"]

env:
  DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Auth Service
        run: |
          docker build -t $DOCKERHUB_USER/devsecops-auth-service:latest ./auth-service
          docker push $DOCKERHUB_USER/devsecops-auth-service:latest

      - name: Build & Push File Service
        run: |
          docker build -t $DOCKERHUB_USER/devsecops-file-service:latest ./file-service
          docker push $DOCKERHUB_USER/devsecops-file-service:latest

      - name: Build & Push Backend
        run: |
          docker build -t $DOCKERHUB_USER/devsecops-backend:latest ./backend
          docker push $DOCKERHUB_USER/devsecops-backend:latest

      - name: Build & Push Frontend
        run: |
          docker build -t $DOCKERHUB_USER/devsecops-frontend:latest ./frontend
          docker push $DOCKERHUB_USER/devsecops-frontend:latest


  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest images
        run: docker compose pull

      - name: Restart stack
        run: docker compose up -d --remove-orphans
